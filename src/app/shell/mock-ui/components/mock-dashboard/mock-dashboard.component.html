<section aria-label="Mock Dashboard">
  <h2>Mock Dashboard</h2>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;">
    <article *ngFor="let card of cards" style="border:1px solid #d0d7de;border-radius:8px;padding:12px;">
      <p style="margin:0 0 4px 0;font-size:12px;color:#57606a;">{{ card.title }}</p>
      <strong style="font-size:20px;">{{ card.value }}</strong>
      <p style="margin:6px 0 0 0;font-size:12px;">Trend: {{ card.trend || 'stable' }}</p>
    </article>
  </div>
</section>
