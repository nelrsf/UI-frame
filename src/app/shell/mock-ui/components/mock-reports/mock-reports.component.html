<section aria-label="Mock Reports">
  <h2>Mock Reports</h2>
  <table style="width:100%;border-collapse:collapse;">
    <thead>
      <tr>
        <th style="text-align:left;border-bottom:1px solid #d0d7de;padding:8px;">Report</th>
        <th style="text-align:left;border-bottom:1px solid #d0d7de;padding:8px;">Owner</th>
        <th style="text-align:left;border-bottom:1px solid #d0d7de;padding:8px;">Last Run</th>
        <th style="text-align:left;border-bottom:1px solid #d0d7de;padding:8px;">State</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of rows">
        <td style="padding:8px;border-bottom:1px solid #f0f2f4;">{{ row.reportName }}</td>
        <td style="padding:8px;border-bottom:1px solid #f0f2f4;">{{ row.owner }}</td>
        <td style="padding:8px;border-bottom:1px solid #f0f2f4;">{{ row.lastRun ? (row.lastRun | date:'short') : 'N/A' }}</td>
        <td style="padding:8px;border-bottom:1px solid #f0f2f4;">{{ row.state }}</td>
      </tr>
    </tbody>
  </table>
</section>
