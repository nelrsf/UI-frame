<div
  class="shell-root"
  data-testid="shell-root"
  role="application"
  aria-label="Application shell"
  [style.--shell-sidebar-width]="((sidebarWidth$ | async) ?? 240) + 'px'"
  [style.--shell-secondary-panel-width]="((secondaryPanelVisible$ | async) ? ((secondaryPanelWidth$ | async) ?? 300) : 0) + 'px'"
>
  <app-sidebar
    class="shell-sidebar"
    [collapsed]="!(sidebarVisible$ | async)"
    [activeItemId]="activeSidebarItem$ | async"
    (collapsedChange)="onSidebarCollapsedChange($event)"
    (activeItemChange)="onSidebarActiveItemChange($event)"
  ></app-sidebar>

  <div class="shell-workspace" role="region" aria-label="Workspace">
    <app-toolbar class="shell-toolbar"></app-toolbar>
    <app-tab-bar class="shell-tabbar"></app-tab-bar>
    <app-content-area class="shell-content-area"></app-content-area>
    <app-secondary-panel
      class="shell-secondary-panel"
      [visible]="(secondaryPanelVisible$ | async) ?? false"
      [width]="(secondaryPanelWidth$ | async) ?? 300"
      (visibilityChange)="onSecondaryPanelVisibilityChange($event)"
      (widthChange)="onSecondaryPanelWidthChange($event)"
    ></app-secondary-panel>
    <app-bottom-panel
      class="shell-bottom-panel"
      [visible]="(bottomPanelVisible$ | async) ?? false"
      [height]="(bottomPanelHeight$ | async) ?? 220"
      (visibilityChange)="onBottomPanelVisibilityChange($event)"
      (heightChange)="onBottomPanelHeightChange($event)"
    ></app-bottom-panel>
  </div>

  <footer class="shell-statusbar" role="contentinfo" aria-label="Status bar">
    <app-status-bar></app-status-bar>
  </footer>
</div>
