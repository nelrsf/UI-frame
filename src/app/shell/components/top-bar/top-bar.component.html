<div class="top-bar" data-testid="top-bar" role="banner" aria-label="Top bar">
  <div class="top-bar__brand" data-testid="top-bar-brand">
    <ng-content select="[slot='brand']"></ng-content>
  </div>

  <div class="top-bar__menu" data-testid="top-bar-menu">
    <ng-content select="[slot='menu']"></ng-content>
  </div>

  <div class="top-bar__actions" data-testid="top-bar-actions">
    <ng-content select="[slot='actions']"></ng-content>
  </div>

  <div class="top-bar__window-controls" data-testid="top-bar-window-controls">
    <ng-content select="[slot='window-controls']"></ng-content>
  </div>
</div>
