<div class="content-area" data-testid="content-area" role="main" aria-label="Main content">
  @if (activeTab) {
    <div class="content-area__view" data-testid="content-area-view">
      <ng-container *ngComponentOutlet="componentType"></ng-container>
    </div>
  } @else {
    <div class="content-area__empty-state" data-testid="content-area-empty-state" aria-live="polite">
      <span class="content-area__empty-icon" aria-hidden="true">☰</span>
      <p class="content-area__empty-text">Selecciona o abre un elemento para comenzar</p>
    </div>
  }
</div>
