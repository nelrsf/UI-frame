<div class="sidebar" data-testid="sidebar" role="complementary" aria-label="Sidebar" [attr.aria-expanded]="!collapsed">
  <app-activity-bar
    class="sidebar__activity-bar"
    [items]="items"
    [activeItemId]="activeItemId"
    (itemClick)="onItemClick($event)"
    data-testid="sidebar-activity-bar"
  ></app-activity-bar>

  @if (!collapsed) {
    <div class="sidebar__panel" data-testid="sidebar-panel" role="region" [attr.aria-label]="'Sidebar panel'">
      <div class="sidebar__content" data-testid="sidebar-content">
        @if (activeItem; as item) {
          <section class="sidebar__section" [attr.data-testid]="'sidebar-content-' + item.id">
            <header class="sidebar__section-header">
              <h2 class="sidebar__section-title">{{ item.label }}</h2>
            </header>
            <div class="sidebar__component-container">
              <ng-container *ngComponentOutlet="item.component"></ng-container>
            </div>
          </section>
        } @else {
          <p class="sidebar__empty" data-testid="sidebar-content-empty">No sidebar sections available.</p>
        }
      </div>
    </div>
  }
</div>
